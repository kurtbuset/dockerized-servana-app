name: servana

services:
  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: redis_servana
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - servana_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes

  # Backend Service (Node.js) - Development Mode
  backend:
    build:
      context: ./backend_servana
      dockerfile: Dockerfile
    container_name: backend_servana
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./backend_servana/.env
    volumes:
      - ./backend_servana:/app
      - /app/node_modules
    networks:
      - servana_network
      - supabase_default
    restart: unless-stopped
    command: npm run dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # Frontend Service (React) - Development Mode
  frontend:
    build:
      context: ./web_servana
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:5000
        VITE_SOCKET_URL: http://localhost:5000
        NODE_ENV: development
    container_name: web_servana
    ports:
      - "3000:80"
    env_file:
      - ./web_servana/.env
    volumes:
      - ./web_servana:/app
      - /app/node_modules
    networks:
      - servana_network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  servana_network:
    driver: bridge
  supabase_default:
    external: true

volumes:
  redis_data:
